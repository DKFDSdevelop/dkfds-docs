<fds-date-picker>
    <label for="ce-datepicker-example-default">Datovælger</label>
    <div class="input-wrapper">
        <input type="text" name="input-text" id="ce-datepicker-example-default">
        <button aria-haspopup="dialog" class="button button-icon-only date-button" aria-label="Åbn datovælger">
            <svg class="icon-svg" focusable="false" aria-hidden="true"><use href="#calendar-month"></use></svg>
        </button>
    </div>
    <div class="ce-date-picker d-none" role="dialog" aria-modal="false">
        <fds-date-picker-grid>
            <div class="grid-container" tabindex="-1">
                <div class="date-picker-header">
                    <span class="sr-only" aria-live="polite"></span>
                    <button class="button button-icon-only previous-month" aria-disabled="true">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960" aria-hidden="true" class="icon-svg">
                            <path d="M560-240 320-480l240-240 56 56-184 184 184 184-56 56Z"></path>
                        </svg>
                        <span class="sr-only">Forrige</span>
                    </button>
                    <div class="month-year-wrapper">
                        <select name="month" aria-label="Måned" class="selected-month">
                            <option value="0" disabled="">Januar</option>
                            <option value="1" disabled="">Februar</option>
                            <option value="2" disabled="">Marts</option>
                            <option value="3">April</option>
                            <option value="4">Maj</option>
                            <option value="5">Juni</option>
                            <option value="6">Juli</option>
                            <option value="7">August</option>
                            <option value="8">September</option>
                            <option value="9">Oktober</option>
                            <option value="10">November</option>
                            <option value="11">December</option>
                        </select>
                        <select name="year" aria-label="År" class="selected-year">
                            <option value="2026">2026</option>
                            <option value="2027">2027</option>
                            <option value="2028">2028</option>
                            <option value="2029">2029</option>
                            <option value="2030">2030</option>
                            <option value="2031">2031</option>
                            <option value="2032">2032</option>
                            <option value="2033">2033</option>
                            <option value="2034">2034</option>
                            <option value="2035">2035</option>
                            <option value="2036">2036</option>
                        </select>
                    </div>
                    <button class="button button-icon-only next-month">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960" aria-hidden="true" class="icon-svg">
                            <path d="M504-480 320-664l56-56 240 240-240 240-56-56 184-184Z"></path>
                        </svg>
                        <span class="sr-only">Næste</span>
                    </button>
                </div>
                <table role="grid" class="date-picker-grid">
                    <thead>
                        <tr>
                            <th scope="col">
                                <span aria-hidden="true">Ma</span>
                                <span class="sr-only">Mandag</span>
                            </th>
                            <th scope="col">
                                <span aria-hidden="true">Ti</span>
                                <span class="sr-only">Tirsdag</span>
                            </th>
                            <th scope="col">
                                <span aria-hidden="true">On</span>
                                <span class="sr-only">Onsdag</span>
                            </th>
                            <th scope="col">
                                <span aria-hidden="true">To</span>
                                <span class="sr-only">Torsdag</span>
                            </th>
                            <th scope="col">
                                <span aria-hidden="true">Fr</span>
                                <span class="sr-only">Fredag</span>
                            </th>
                            <th scope="col">
                                <span aria-hidden="true">Lø</span>
                                <span class="sr-only">Lørdag</span>
                            </th>
                            <th scope="col">
                                <span aria-hidden="true">Sø</span>
                                <span class="sr-only">Søndag</span>
                            </th>
                        </tr>
                    </thead>
                    <tbody>
