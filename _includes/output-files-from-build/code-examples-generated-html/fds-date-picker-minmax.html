<fds-date-picker>
    <label for="ce-datepicker-example-minmax">Datovælger med begrænsede datoer</label>
    <div class="input-wrapper">
        <input type="text" name="input-text" id="ce-datepicker-example-minmax">
        <button aria-haspopup="dialog" class="button button-icon-only date-button" aria-label="Åbn datovælger">
            <svg class="icon-svg" focusable="false" aria-hidden="true"><use href="#calendar-month"></use></svg>
        </button>
    </div>
    <div class="ce-date-picker d-none" role="dialog" aria-modal="false">
        <fds-date-picker-grid min-date="2000-02-02" max-date="2000-02-20">
            <div class="grid-container" tabindex="-1">
                <div class="date-picker-header">
                    <span class="sr-only" aria-live="polite"></span>
                    <button class="button button-icon-only previous-month" aria-disabled="true">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960" aria-hidden="true" class="icon-svg">
                            <path d="M560-240 320-480l240-240 56 56-184 184 184 184-56 56Z"></path>
                        </svg>
                        <span class="sr-only">Forrige</span>
                    </button>
                    <div class="month-year-wrapper">
                        <select name="month" aria-label="Måned" class="selected-month">
                            <option value="0" disabled="">Januar</option>
                            <option value="1">Februar</option>
                            <option value="2" disabled="">Marts</option>
                            <option value="3" disabled="">April</option>
                            <option value="4" disabled="">Maj</option>
                            <option value="5" disabled="">Juni</option>
                            <option value="6" disabled="">Juli</option>
                            <option value="7" disabled="">August</option>
                            <option value="8" disabled="">September</option>
                            <option value="9" disabled="">Oktober</option>
                            <option value="10" disabled="">November</option>
                            <option value="11" disabled="">December</option>
                        </select>
                        <select name="year" aria-label="År" class="selected-year">
                            <option value="2000">2000</option>
                        </select>
                    </div>
                    <button class="button button-icon-only next-month" aria-disabled="true">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960" aria-hidden="true" class="icon-svg">
                            <path d="M504-480 320-664l56-56 240 240-240 240-56-56 184-184Z"></path>
                        </svg>
                        <span class="sr-only">Næste</span>
                    </button>
                </div>
                <table role="grid" class="date-picker-grid">
                    <thead>
                        <tr>
                            <th scope="col">
                                <span aria-hidden="true">Ma</span>
                                <span class="sr-only">Mandag</span>
                            </th>
                            <th scope="col">
                                <span aria-hidden="true">Ti</span>
                                <span class="sr-only">Tirsdag</span>
                            </th>
                            <th scope="col">
                                <span aria-hidden="true">On</span>
                                <span class="sr-only">Onsdag</span>
                            </th>
                            <th scope="col">
                                <span aria-hidden="true">To</span>
                                <span class="sr-only">Torsdag</span>
                            </th>
                            <th scope="col">
                                <span aria-hidden="true">Fr</span>
                                <span class="sr-only">Fredag</span>
                            </th>
                            <th scope="col">
                                <span aria-hidden="true">Lø</span>
                                <span class="sr-only">Lørdag</span>
                            </th>
                            <th scope="col">
                                <span aria-hidden="true">Sø</span>
                                <span class="sr-only">Søndag</span>
                            </th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td></td>
                            <td data-date="2000-02-01" aria-label="1. februar 2000" aria-disabled="true">1</td>
                            <td data-date="2000-02-02" aria-label="2. februar 2000, tidligste valgbare dato" aria-selected="false" tabindex="-1">2</td>
                            <td data-date="2000-02-03" aria-label="3. februar 2000" aria-selected="false" tabindex="-1">3</td>
                            <td data-date="2000-02-04" aria-label="4. februar 2000" aria-selected="false" tabindex="-1">4</td>
                            <td data-date="2000-02-05" aria-label="5. februar 2000" aria-selected="false" tabindex="-1">5</td>
                            <td data-date="2000-02-06" aria-label="6. februar 2000" aria-selected="false" tabindex="-1">6</td>
                        </tr>
                        <tr>
                            <td data-date="2000-02-07" aria-label="7. februar 2000" aria-selected="false" tabindex="-1">7</td>
                            <td data-date="2000-02-08" aria-label="8. februar 2000" aria-selected="false" tabindex="-1">8</td>
                            <td data-date="2000-02-09" aria-label="9. februar 2000" aria-selected="false" tabindex="-1">9</td>
                            <td data-date="2000-02-10" aria-label="10. februar 2000" aria-selected="false" tabindex="-1">10</td>
                            <td data-date="2000-02-11" aria-label="11. februar 2000" aria-selected="false" tabindex="-1">11</td>
                            <td data-date="2000-02-12" aria-label="12. februar 2000" aria-selected="false" tabindex="-1">12</td>
                            <td data-date="2000-02-13" aria-label="13. februar 2000" aria-selected="false" tabindex="-1">13</td>
                        </tr>
                        <tr>
                            <td data-date="2000-02-14" aria-label="14. februar 2000" aria-selected="false" tabindex="-1">14</td>
                            <td data-date="2000-02-15" aria-label="15. februar 2000" aria-selected="false" tabindex="-1">15</td>
                            <td data-date="2000-02-16" aria-label="16. februar 2000" aria-selected="false" tabindex="-1">16</td>
                            <td data-date="2000-02-17" aria-label="17. februar 2000" aria-selected="false" tabindex="-1">17</td>
                            <td data-date="2000-02-18" aria-label="18. februar 2000" aria-selected="false" tabindex="-1">18</td>
                            <td data-date="2000-02-19" aria-label="19. februar 2000" aria-selected="false" tabindex="-1">19</td>
                            <td data-date="2000-02-20" aria-label="20. februar 2000, seneste valgbare dato" aria-selected="false" tabindex="0">20</td>
                        </tr>
                        <tr>
                            <td data-date="2000-02-21" aria-label="21. februar 2000" aria-disabled="true">21</td>
                            <td data-date="2000-02-22" aria-label="22. februar 2000" aria-disabled="true">22</td>
                            <td data-date="2000-02-23" aria-label="23. februar 2000" aria-disabled="true">23</td>
                            <td data-date="2000-02-24" aria-label="24. februar 2000" aria-disabled="true">24</td>
                            <td data-date="2000-02-25" aria-label="25. februar 2000" aria-disabled="true">25</td>
                            <td data-date="2000-02-26" aria-label="26. februar 2000" aria-disabled="true">26</td>
                            <td data-date="2000-02-27" aria-label="27. februar 2000" aria-disabled="true">27</td>
                        </tr>
                        <tr>
                            <td data-date="2000-02-28" aria-label="28. februar 2000" aria-disabled="true">28</td>
                            <td data-date="2000-02-29" aria-label="29. februar 2000" aria-disabled="true">29</td>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td></td>
                        </tr>
                        <tr>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </fds-date-picker-grid>
        <div tabindex="-1">
            <button class="close-button function-link">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960" aria-hidden="true" class="icon-svg">
                    <path d="m256-200-56-56 224-224-224-224 56-56 224 224 224-224 56 56-224 224 224 224-56 56-224-224-224 224Z"></path>
                </svg>Luk
            </button>
        </div>
    </div>
</fds-date-picker>
