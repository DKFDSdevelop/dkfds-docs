<fds-upload-file>
    <label class="fds-upload-label" for="input-id">Simpel vedhæft fil</label>
    <div class="fds-upload-dropzone">
        <input type="file" name="documentation" id="input-id" required="" multiple="" class="fds-upload-input" aria-describedby="dropzone-input-id">
        <div class="fds-upload-dropzone-content" id="dropzone-input-id">
            <svg class="icon-svg" aria-hidden="true"><use href="#plus-circle"></use></svg>
            <p>Træk dine filer herhen eller <span class="fds-upload-choose">vælg filer</span>
            </p>
        </div>
    </div>
</fds-upload-file>
