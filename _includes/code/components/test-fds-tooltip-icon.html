<main class="container page-container" id="main-content">

    <div class="row mb-905">
        <div class="col-12">
            <h1 class="h2 mt-0">Tooltip-ikon</h1>
        </div>
    </div>

    <div class="row mb-905">
        <div class="col-12">
            <h2 class="h3 mt-0">Default ikon</h2>
        </div>
        <div class="col-12">
            <fds-tooltip-icon tooltip-text="Dette er et tooltip"
                sr-label="Læs mere"></fds-tooltip-icon>
        </div>
    </div>

    <div class="row mb-905">
        <div class="col-12">
            <h2 class="h3 mt-0">Inputfelt med tooltip</h2>
        </div>
        <div class="col-12">
            <fds-input>
                <label>Label</label>
                <fds-tooltip-icon tooltip-text="Dette er et tooltip ved et inputfelt"
                    sr-label="Læs mere"></fds-tooltip-icon>
                <input type="text" name="input-text">
            </fds-input>
        </div>
    </div>

</main>
