<main class="container page-container" id="main-content">

    <div class="row mb-905">
        <div class="col-12">
            <h1 class="h2 mt-0">Tooltip-ikon</h1>
        </div>
    </div>

    <div class="row mb-905">
        <div class="col-12">
            <h2 class="h3 mt-0">Default ikon</h2>
        </div>
        <div class="col-12 d-flex justify-content-between">
            <fds-tooltip-icon tooltip-text="Dette tooltip sidder i venstre side i rækken"
                sr-label="Læs mere"></fds-tooltip-icon>
            <fds-tooltip-icon tooltip-text="Dette tooltip sidder i midten i rækken"
                sr-label="Læs mere"></fds-tooltip-icon>
            <fds-tooltip-icon tooltip-text="Dette tooltip sidder i højre side i rækken"
                sr-label="Læs mere"></fds-tooltip-icon>
        </div>
    </div>

    <div class="row mb-905">
        <div class="col-12">
            <h2 class="h3 mt-0">Ikon med lang tooltiptekst</h2>
        </div>
        <div class="col-12">
            <fds-tooltip-icon
                tooltip-text="Dette er en alt for lang tekst til et tooltip, men den er god at teste med. Tooltips bliver for lange, når de fylder mere end 4 linjer. fgdgdgfdsgfsdgfsdgsfdgerstsgfsgsgfgsfdgsdtertsgfgfdgsfgsgsdfgrtgrfgsfgsfdgsdfgsdrterargfsgsdfgsertg"
                sr-label="Læs mere"></fds-tooltip-icon>
        </div>
    </div>

    <div class="row mb-905">
        <div class="col-12">
            <h2 class="h3 mt-0">Inputfelt med tooltip</h2>
        </div>
        <div class="col-12">
            <fds-input>
                <label>Label</label>
                <fds-tooltip-icon tooltip-text="Dette er et tooltip ved et inputfelt"
                    sr-label="Læs mere"></fds-tooltip-icon>
                <input type="text" name="input-text">
            </fds-input>
        </div>
    </div>

    <div class="row mb-905">
        <div class="col-12">
            <h2 class="h3 mt-0">Placering</h2>
        </div>
        <div class="col-12">
            <fds-tooltip-icon tooltip-text="Tooltip er som default sat over ikonet"
                sr-label="Læs mere" placement="above"></fds-tooltip-icon>
            <fds-tooltip-icon tooltip-text="Tooltip er som default sat under ikonet"
                sr-label="Læs mere" placement="below"></fds-tooltip-icon>
        </div>
    </div>

    <div class="row mb-905">
        <div class="col-12">
            <h2 class="h3 mt-0">Inde i scrollbare containers</h2>
        </div>
        <div class="col-12">
            <div style="height: 400px; width: 100%; background-color: lightgray; overflow: scroll; padding: 50px;"
                id="outer-container">
                <div style="height: 120px; width: 150%; background-color: palegreen; overflow: scroll; margin-bottom: 600px;"
                    id="middle-container">
                    <div style="height: 200px; width: 150%; background-color: deepskyblue; padding: 50px; margin: 10px;"
                        id="inner-container">
                        <fds-tooltip-icon tooltip-text="Tooltip inde i scrollbar container"
                            sr-label="Læs mere"></fds-tooltip-icon>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="row mb-905">
        <div class="col-12">
            <h2 class="h3 mt-0">Ikon i modal</h2>
        </div>
        <div class="col-12">
            <button class="button button-tertiary" data-module="modal"
                data-target="modal-example" aria-haspopup="dialog"
                aria-describedby="tooltip-modal" id="modal-opener-1615">Åbn modal</button>
        </div>
    </div>

    <div class="row mb-905">
        <div class="col-12">
            <h2 class="h3 mt-0">HTML genereret på forhånd</h2>
        </div>
        <div class="col-12">
            <fds-tooltip-icon tooltip-text="Dette tooltip fik ikke genereret HTML"
                sr-label="Skærmlæsertekst">
                <button class="button button-unstyled" type="button" aria-label="Læs mere"
                    aria-controls="tooltip-d4390294" aria-expanded="false">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960" focusable="false" aria-hidden="true" class="icon-svg">
                        <path
                            d="M440-280h80v-240h-80v240Zm40-320q17 0 28.5-11.5T520-640q0-17-11.5-28.5T480-680q-17 0-28.5 11.5T440-640q0 17 11.5 28.5T480-600Zm0 520q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Zm0-80q134 0 227-93t93-227q0-134-93-227t-227-93q-134 0-227 93t-93 227q0 134 93 227t227 93Zm0-320Z">
                        </path>
                    </svg>
                </button>
                <span aria-atomic="true" aria-live="assertive">
                    <span id="tooltip-d4390294" tabindex="-1" class="tooltip"></span>
                </span>
                <span aria-hidden="true" class="tooltip-arrow"></span>
            </fds-tooltip-icon>
        </div>
    </div>

</main>

<div class="fds-modal-container">
    <div class="fds-modal" id="modal-example" aria-hidden="true" role="dialog"
        aria-modal="true" aria-labelledby="modal-example-heading"
        data-modal-opener="modal-opener-1615">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modal-example-heading">Modal med handlinger</h2>
                <button class="modal-close function-link" data-modal-close="">
                    <svg class="icon-svg" focusable="false" aria-hidden="true">
                        <use href="#close"></use>
                    </svg>Luk
                </button>
            </div>
            <div class="modal-body">
                <div class="d-flex align-items-center justify-content-between">
                    <fds-tooltip-icon tooltip-text="Dette er et tooltip i en modal"
                        sr-label="Læs mere"></fds-tooltip-icon>
                </div>
            </div>
            <div class="modal-footer">
                <button class="button button-secondary" data-modal-close="">
                    Luk
                </button>
            </div>

        </div>
    </div>
</div>
